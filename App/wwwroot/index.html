<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deusald Localizer</title>

    <!-- Bootstrap 5 (dark mode via data-bs-theme on <html>) -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous" />

    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- App styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="App.styles.css" />
</head>
<body>
<div id="app">Loading...</div>

<div id="blazor-error-ui" style="display:none">
    An unhandled error has occurred.
    <a href="" class="reload">Reload</a>
    <a class="dismiss">🗙</a>
</div>

<script src="_framework/blazor.webview.js" autostart="false"></script>
<script>
    // Start Blazor
    Blazor.start();

    // ── Drag-and-drop helper exposed to Blazor ───────────────────────
    window.registerDropZone = (element, dotnetRef) => {
        if (!element) return;

        element.addEventListener('dragover', e => {
            e.preventDefault();
            element.classList.add('dragover');
        });
        element.addEventListener('dragleave', () => {
            element.classList.remove('dragover');
        });
        element.addEventListener('drop', async e => {
            e.preventDefault();
            element.classList.remove('dragover');
            const file = e.dataTransfer?.files?.[0];
            if (file) await dotnetRef.invokeMethodAsync('OnFileDrop', file.path ?? file.name);
        });
    };

    // ── File picker helper ───────────────────────────────────────────
    window.openFilePicker = (accept) => new Promise(resolve => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = accept;
        input.onchange = () => resolve(input.files?.[0]?.path ?? null);
        input.click();
    });
</script>
</body>
</html>
