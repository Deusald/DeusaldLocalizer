<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Deusald Localizer</title>

    <!-- Bootstrap 5 (dark mode via data-bs-theme on <html>) -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"/>

    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- App styles -->
    <link rel="stylesheet" href="css/app.css"/>
    <link rel="stylesheet" href="App.styles.css"/>
</head>
<body>
<div id="app">
    <style>
        #app-loading {
            position: fixed;
            inset: 0;
            background: #0e0f13;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        .splash-orbs {
            position: relative;
            width: 56px;
            height: 56px;
        }

        .splash-orb {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        .splash-orb-1 { left: 0;   top: 8px;  background: rgba(91,108,255,.85); }
        .splash-orb-2 { left: 18px; top: 0;   background: rgba(120,160,255,.55); mix-blend-mode: screen; }
        .splash-orb-3 { left: 10px; top: 18px; background: rgba(160,120,255,.5);  mix-blend-mode: screen; }

        .splash-text {
            font-size: 13px;
            font-weight: 500;
            color: #6a6b73;
            letter-spacing: 0.04em;
        }
    </style>
    <div id="app-loading">
        <div class="splash-orbs">
            <div class="splash-orb splash-orb-1"></div>
            <div class="splash-orb splash-orb-2"></div>
            <div class="splash-orb splash-orb-3"></div>
        </div>
        <span class="splash-text">Loading…</span>
    </div>
</div>

<div id="blazor-error-ui" style="display:none">
    An unhandled error has occurred.
    <a href="" class="reload">Reload</a>
    <a class="dismiss">🗙</a>
</div>

<script src="_framework/blazor.webview.js" autostart="false"></script>
<script>
    // Start Blazor
    Blazor.start();

    // ── Drag-and-drop helper exposed to Blazor ───────────────────────
    window.registerDropZone = (element, dotnetRef) => {
        if (!element) return;

        element.addEventListener('dragover', e => {
            e.preventDefault();
            element.classList.add('dragover');
        });
        element.addEventListener('dragleave', () => {
            element.classList.remove('dragover');
        });
        element.addEventListener('drop', async e => {
            e.preventDefault();
            element.classList.remove('dragover');
            const file = e.dataTransfer?.files?.[0];
            if (file) await dotnetRef.invokeMethodAsync('OnFileDrop', file.path ?? file.name);
        });
    };

    // ── File picker helper ───────────────────────────────────────────
    window.openFilePicker = (accept) => new Promise(resolve => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = accept;
        input.onchange = () => resolve(input.files?.[0]?.path ?? null);
        input.click();
    });
</script>
</body>
</html>
