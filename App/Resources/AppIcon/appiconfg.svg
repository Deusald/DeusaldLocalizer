<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg">

    <!--
        Three overlapping circles matching the welcome page logo,
        scaled and centered in the 456×456 icon canvas.

        In the welcome page the orbs are 22px on a 34×34 canvas.
        Scale factor ≈ 7× → orb diameter ≈ 154px, canvas ≈ 238×238.
        Centered in 456×456: offset = (456 - 238) / 2 = 109.
    -->

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <!-- Orb 1 — left-centre, solid indigo -->
    <circle cx="187" cy="219" r="77"
            fill="rgba(91,108,255,0.92)"
            filter="url(#glow)" />

    <!-- Orb 2 — right-top, pale blue, screen blend -->
    <circle cx="265" cy="185" r="77"
            fill="rgba(130,170,255,0.70)"
            style="mix-blend-mode:screen"
            filter="url(#glow)" />

    <!-- Orb 3 — centre-bottom, violet, screen blend -->
    <circle cx="228" cy="256" r="77"
            fill="rgba(170,130,255,0.62)"
            style="mix-blend-mode:screen"
            filter="url(#glow)" />

</svg>