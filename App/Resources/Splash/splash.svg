<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg">

    <!--
        Native MAUI splash screen — rendered by the OS on a flat background
        colour defined by Color="#0e0f13" in the .csproj MauiSplashScreen element.

        Three overlapping circles matching the welcome-page logo.
        No mix-blend-mode — the MAUI rasterizer does not support SVG blending,
        so we approximate the overlap with plain semi-transparent fills layered
        on the dark background.

        Orb layout (centres):
          Orb 1  left-centre  →  (187, 219)
          Orb 2  right-top    →  (265, 185)
          Orb 3  centre-low   →  (228, 256)
        Radius: 72 px each
    -->

    <!-- Orb 1 — indigo, fully opaque base -->
    <circle cx="187" cy="219" r="72" fill="#5b6cff" opacity="0.90" />

    <!-- Orb 2 — pale blue, semi-transparent so orb 1 shows through -->
    <circle cx="265" cy="185" r="72" fill="#78a0ff" opacity="0.60" />

    <!-- Orb 3 — violet, semi-transparent -->
    <circle cx="228" cy="256" r="72" fill="#a07aff" opacity="0.55" />

</svg>